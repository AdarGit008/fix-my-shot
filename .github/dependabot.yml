# Dependabot — configured ahead of the first dependency manifests (2026-07-21,
# founder-approved; supersedes the ADR-0001 "presence theater" deferral now that
# code lands next). Each ecosystem entry activates the moment its manifest
# exists; until then Dependabot reports "no manifest found" for it, which is
# expected and harmless.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
